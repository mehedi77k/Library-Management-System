<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar('books')}"></div>

<main class="container narrow">
    <div class="page-header">
        <div>
            <h1 th:text="${pageTitle}">Book Form</h1>
            <p>Enter book information carefully.</p>
        </div>
    </div>

    <form class="form-card" th:action="@{/books/save}" th:object="${book}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Title</label>
            <input type="text" th:field="*{title}" placeholder="Enter book title">
            <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="form-group">
            <label>Author</label>
            <input type="text" th:field="*{author}" placeholder="Enter author name">
            <span class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
        </div>

        <div class="form-group">
            <label>ISBN</label>
            <input type="text" th:field="*{isbn}" placeholder="Enter ISBN">
            <span class="field-error" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></span>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" th:field="*{category}" placeholder="Programming, Novel, Science, etc.">
            <span class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
        </div>

        <div class="form-group">
            <label>Total Copies</label>
            <input type="number" th:field="*{totalCopies}" min="1" placeholder="Enter total copies">
            <span class="field-error" th:if="${#fields.hasErrors('totalCopies')}" th:errors="*{totalCopies}"></span>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary">Save</button>
            <a class="btn secondary" th:href="@{/books}">Cancel</a>
        </div>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
