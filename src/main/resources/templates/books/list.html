<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Books')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar('books')}"></div>

<main class="container">
    <div class="page-header">
        <div>
            <h1>Books</h1>
            <p>Search, filter, and manage all library books.</p>
        </div>

        <a class="btn primary" th:href="@{/books/add}">Add Book</a>
    </div>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <form class="filter-card" th:action="@{/books}" method="get">
        <div class="filter-row">
            <div class="filter-group large">
                <label>Search</label>
                <input type="text"
                       name="keyword"
                       placeholder="Search by title, author, ISBN, or category"
                       th:value="${keyword}">
            </div>

            <div class="filter-group">
                <label>Category</label>
                <select name="category">
                    <option value="">All Categories</option>
                    <option th:each="category : ${categories}"
                            th:value="${category}"
                            th:text="${category}"
                            th:selected="${selectedCategory == category}">
                        Category
                    </option>
                </select>
            </div>

            <div class="filter-group">
                <label>Availability</label>
                <select name="availability">
                    <option value="ALL" th:selected="${availability == 'ALL'}">All</option>
                    <option value="AVAILABLE" th:selected="${availability == 'AVAILABLE'}">Available</option>
                    <option value="UNAVAILABLE" th:selected="${availability == 'UNAVAILABLE'}">Unavailable</option>
                </select>
            </div>

            <div class="filter-group small">
                <label>Page Size</label>
                <select name="size" onchange="this.form.submit()">
                    <option th:each="option : ${pageSizes}"
                            th:value="${option}"
                            th:text="${option}"
                            th:selected="${pageSize == option}">
                        10
                    </option>
                </select>
            </div>
        </div>

        <input type="hidden" name="page" value="0">

        <div class="filter-actions">
            <button type="submit" class="btn primary">Apply Filters</button>
            <a class="btn secondary" th:href="@{/books}">Reset</a>
        </div>
    </form>

    <div class="result-summary">
        <span th:text="'Showing ' + ${bookPage.numberOfElements} + ' of ' + ${bookPage.totalElements} + ' books'">
            Showing 0 of 0 books
        </span>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Category</th>
                <th>Total</th>
                <th>Available</th>
                <th>Status</th>
                <th class="actions-column">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}">1</td>
                <td th:text="${book.title}">Book Title</td>
                <td th:text="${book.author}">Author</td>
                <td th:text="${book.isbn}">ISBN</td>
                <td th:text="${book.category}">Category</td>
                <td th:text="${book.totalCopies}">0</td>
                <td th:text="${book.availableCopies}">0</td>
                <td>
                    <span th:if="${book.availableCopies > 0}" class="badge success">Available</span>
                    <span th:if="${book.availableCopies <= 0}" class="badge danger">Unavailable</span>
                </td>
                <td>
                    <a class="btn small" th:href="@{'/books/edit/' + ${book.id}}">Edit</a>

                    <form sec:authorize="hasRole('ADMIN')"
                          class="inline-form"
                          th:action="@{'/books/delete/' + ${book.id}}"
                          method="post"
                          onsubmit="return confirm('Are you sure you want to delete this book?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn small danger">Delete</button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(books)}">
                <td colspan="9" class="empty">No books found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="pagination" th:if="${bookPage.totalPages > 1}">
        <a class="page-link"
           th:classappend="${bookPage.first} ? ' disabled' : ''"
           th:href="${bookPage.first} ? '#' : @{/books(page=${currentPage - 1}, size=${pageSize}, keyword=${keyword}, category=${selectedCategory}, availability=${availability})}">
            Previous
        </a>

        <span class="page-info"
              th:text="'Page ' + ${currentPage + 1} + ' of ' + ${bookPage.totalPages}">
            Page 1 of 1
        </span>

        <a class="page-link"
           th:classappend="${bookPage.last} ? ' disabled' : ''"
           th:href="${bookPage.last} ? '#' : @{/books(page=${currentPage + 1}, size=${pageSize}, keyword=${keyword}, category=${selectedCategory}, availability=${availability})}">
            Next
        </a>
    </nav>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
