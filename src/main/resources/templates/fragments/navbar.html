<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav class="navbar" th:fragment="navbar(activePage)">
    <div class="navbar-left">
        <a class="brand" th:href="@{/dashboard}">Library Management System</a>
    </div>

    <div class="nav-links">
        <a th:href="@{/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
            Dashboard
        </a>

        <a th:href="@{/books}"
           th:classappend="${activePage == 'books'} ? ' active' : ''">
            Books
        </a>

        <a th:href="@{/members}"
           th:classappend="${activePage == 'members'} ? ' active' : ''">
            Members
        </a>

        <a th:href="@{/borrow/issue}"
           th:classappend="${activePage == 'issue'} ? ' active' : ''">
            Issue Book
        </a>

        <a th:href="@{/borrow/records}"
           th:classappend="${activePage == 'records'} ? ' active' : ''">
            Borrow Records
        </a>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/librarians}"
           th:classappend="${activePage == 'librarians'} ? ' active' : ''">
            Librarians
        </a>
    </div>

    <div class="navbar-right" sec:authorize="isAuthenticated()">
        <span class="logged-user">
            Logged in as <strong sec:authentication="name">user</strong>
        </span>

        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-button">Logout</button>
        </form>
    </div>
</nav>

</body>
</html>
