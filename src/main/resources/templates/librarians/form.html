<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' | Library Management System'">Librarian Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">Library Management System</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/books}">Books</a>
        <a th:href="@{/members}">Members</a>
        <a th:href="@{/borrow/issue}">Issue Book</a>
        <a th:href="@{/borrow/records}">Borrow Records</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/librarians}">Librarians</a>

        <span class="logged-user">
            Logged in as <strong sec:authentication="name">user</strong>
        </span>

        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-button">Logout</button>
        </form>
    </div>
</nav>

<main class="container narrow">
    <div class="page-header">
        <div>
            <h1 th:text="${pageTitle}">Librarian Form</h1>
            <p th:if="${!editMode}">Create a new librarian account.</p>
            <p th:if="${editMode}">Update librarian account information.</p>
        </div>
    </div>

    <form class="form-card" th:action="@{/librarians/save}" th:object="${userForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div th:if="${#fields.hasGlobalErrors()}" class="alert error">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}">Error</p>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Enter username">
            <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" placeholder="Enter full name">
            <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="Enter email address">
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <label th:if="${!editMode}">Password</label>
            <label th:if="${editMode}">New Password <span class="muted-text">(optional)</span></label>

            <input type="password"
                   th:field="*{password}"
                   th:placeholder="${editMode} ? 'Leave blank to keep current password' : 'Enter password'">

            <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>

            <p class="help-text" th:if="${editMode}">
                Leave the password field empty if you do not want to change the current password.
            </p>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select th:field="*{enabled}">
                <option th:value="true">Enabled</option>
                <option th:value="false">Disabled</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary">Save</button>
            <a class="btn secondary" th:href="@{/librarians}">Cancel</a>
        </div>
    </form>
</main>

</body>
</html>
