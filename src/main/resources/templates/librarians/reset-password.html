<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Library Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">Library Management System</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/books}">Books</a>
        <a th:href="@{/members}">Members</a>
        <a th:href="@{/borrow/issue}">Issue Book</a>
        <a th:href="@{/borrow/records}">Borrow Records</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/librarians}">Librarians</a>

        <span class="logged-user">
            Logged in as <strong sec:authentication="name">user</strong>
        </span>

        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-button">Logout</button>
        </form>
    </div>
</nav>

<main class="container narrow">
    <div class="page-header">
        <div>
            <h1>Reset Password</h1>
            <p>Set a new password for this librarian account.</p>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

    <div class="details-card">
        <p><strong>Username:</strong> <span th:text="${librarian.username}">username</span></p>
        <p><strong>Full Name:</strong> <span th:text="${librarian.fullName}">Full Name</span></p>
        <p><strong>Email:</strong> <span th:text="${librarian.email != null ? librarian.email : '-'}">email</span></p>
    </div>

    <form class="form-card" th:action="@{'/librarians/reset-password/' + ${librarian.id}}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="newPassword" placeholder="Enter new password" required minlength="6">
            <p class="help-text">Password must be at least 6 characters.</p>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary">Reset Password</button>
            <a class="btn secondary" th:href="@{/librarians}">Cancel</a>
        </div>
    </form>
</main>

</body>
</html>
