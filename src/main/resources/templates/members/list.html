<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Members')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar('members')}"></div>

<main class="container">
    <div class="page-header">
        <div>
            <h1>Members</h1>
            <p>Search, filter, and manage library members.</p>
        </div>

        <a class="btn primary" th:href="@{/members/add}">Add Member</a>
    </div>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <form class="filter-card" th:action="@{/members}" method="get">
        <div class="filter-row">
            <div class="filter-group large">
                <label>Search</label>
                <input type="text"
                       name="keyword"
                       placeholder="Search by name, email, phone, or address"
                       th:value="${keyword}">
            </div>

            <div class="filter-group">
                <label>Status</label>
                <select name="status">
                    <option value="ALL" th:selected="${status == 'ALL'}">All</option>
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Active</option>
                    <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Inactive</option>
                </select>
            </div>

            <div class="filter-group small">
                <label>Page Size</label>
                <select name="size" onchange="this.form.submit()">
                    <option th:each="option : ${pageSizes}"
                            th:value="${option}"
                            th:text="${option}"
                            th:selected="${pageSize == option}">
                        10
                    </option>
                </select>
            </div>
        </div>

        <input type="hidden" name="page" value="0">

        <div class="filter-actions">
            <button type="submit" class="btn primary">Apply Filters</button>
            <a class="btn secondary" th:href="@{/members}">Reset</a>
        </div>
    </form>

    <div class="result-summary">
        <span th:text="'Showing ' + ${memberPage.numberOfElements} + ' of ' + ${memberPage.totalElements} + ' members'">
            Showing 0 of 0 members
        </span>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Status</th>
                <th class="actions-column">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="member : ${members}">
                <td th:text="${member.id}">1</td>
                <td th:text="${member.name}">Member Name</td>
                <td th:text="${member.email}">member@email.com</td>
                <td th:text="${member.phone}">Phone</td>
                <td th:text="${member.address}">Address</td>
                <td>
                    <span th:if="${member.active}" class="badge success">Active</span>
                    <span th:if="${!member.active}" class="badge danger">Inactive</span>
                </td>
                <td>
                    <a class="btn small" th:href="@{'/members/edit/' + ${member.id}}">Edit</a>

                    <form sec:authorize="hasRole('ADMIN')"
                          class="inline-form"
                          th:action="@{'/members/delete/' + ${member.id}}"
                          method="post"
                          onsubmit="return confirm('Are you sure you want to delete this member?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn small danger">Delete</button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(members)}">
                <td colspan="7" class="empty">No members found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="pagination" th:if="${memberPage.totalPages > 1}">
        <a class="page-link"
           th:classappend="${memberPage.first} ? ' disabled' : ''"
           th:href="${memberPage.first} ? '#' : @{/members(page=${currentPage - 1}, size=${pageSize}, keyword=${keyword}, status=${status})}">
            Previous
        </a>

        <span class="page-info"
              th:text="'Page ' + ${currentPage + 1} + ' of ' + ${memberPage.totalPages}">
            Page 1 of 1
        </span>

        <a class="page-link"
           th:classappend="${memberPage.last} ? ' disabled' : ''"
           th:href="${memberPage.last} ? '#' : @{/members(page=${currentPage + 1}, size=${pageSize}, keyword=${keyword}, status=${status})}">
            Next
        </a>
    </nav>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
